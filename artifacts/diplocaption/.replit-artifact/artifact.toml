kind = "web"
previewPath = "/"
title = "DiploCaption"
version = "1.0.0"
id = "artifacts/diplocaption"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20823
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/diplocaption run dev"

[services.env]
PORT = "20823"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/diplocaption", "run", "build"]
publicDir = "artifacts/diplocaption/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
